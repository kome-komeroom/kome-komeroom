<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>管理者用 | よねまるの部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame room-page">

    <header class="site-header">
      <span class="eng">admin</span>
      <h1>管理者用</h1>
      <div class="divider"></div>
    </header>

    <div class="room-body">

      <div id="authArea">
        <div class="auth-box">
          <p class="gate-label" style="margin-bottom:14px;">ログイン</p>
          <div class="row">
            <input type="email" id="authEmail" placeholder="メールアドレス" autocomplete="off">
            <input type="password" id="authPass" placeholder="パスワード" autocomplete="off">
          </div>
          <button class="echat-btn primary" id="authLoginBtn">ログイン</button>
          <span class="echat-note" id="authStatus"></span>
        </div>
      </div>

      <div id="gated-content" class="gated-content" style="display:none;">
        <p class="echat-note" id="inboxUser" style="margin-bottom:18px;"></p>
        <ul class="room-cards">
          <li>
            <a class="room-card" href="admin-notice.html">
              <div class="room-card-top">
                <span class="num">01</span>
                <span class="label">新着お知らせ</span>
              </div>
            </a>
          </li>
          <li>
            <a class="room-card" href="admin-memo.html">
              <div class="room-card-top">
                <span class="num">02</span>
                <span class="label">作品メモ</span>
              </div>
            </a>
          </li>
          <li>
            <a class="room-card" href="admin-clap.html">
              <div class="room-card-top">
                <span class="num">03</span>
                <span class="label">Web拍手メッセージ</span>
              </div>
            </a>
          </li>
        </ul>
      </div>

    </div>

    <div class="back-wrap">
      <a class="back-link" href="index.html">← トップへ戻る</a>
    </div>

    <footer class="site-footer">
      <span class="mark">yonemaru's room</span>
    </footer>

  </div>

  <!-- ▼▼▼ Firebase(他ページと同じ設定値) ▼▼▼ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4J-diiATTbRl6RF0yATq4VwCofkET1g4",
      authDomain: "yonemaru-room.firebaseapp.com",
      projectId: "yonemaru-room",
      storageBucket: "yonemaru-room.firebasestorage.app",
      messagingSenderId: "719471435345",
      appId: "1:719471435345:web:e6c5a8bd93f236b8efa270"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
  <!-- ▲▲▲ ここまで ▲▲▲ -->

  <script>
    document.getElementById('authLoginBtn').addEventListener('click', () => {
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPass').value;
      const status = document.getElementById('authStatus');
      status.textContent = 'ログインしています…';
      auth.signInWithEmailAndPassword(email, pass)
        .catch((err) => {
          console.error(err);
          status.textContent = 'ログインできませんでした。メールアドレスとパスワードをご確認ください。';
        });
    });

    auth.onAuthStateChanged((user) => {
      const authArea = document.getElementById('authArea');
      const gatedContent = document.getElementById('gated-content');
      if (user) {
        authArea.style.display = 'none';
        gatedContent.style.display = 'block';
        const userEl = document.getElementById('inboxUser');
        if (userEl) userEl.textContent = 'ログイン中：' + user.email;
        if (typeof onLoggedIn === 'function') onLoggedIn();
      } else {
        authArea.style.display = 'block';
        gatedContent.style.display = 'none';
      }
    });
  </script>
</body>
</html>
