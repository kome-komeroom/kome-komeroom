<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>日記 | よねまるの部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame room-page">

    <header class="site-header">
      <span class="eng">diary</span>
      <h1>日記</h1>
      <div class="divider"></div>
    </header>

    <div class="room-body">
      <p class="diary-intro">ここで直接書けます。タイトルは空でもOK、合言葉を入れて投稿してください。</p>

      <div class="diary-post-form">
        <div class="row">
          <input type="text" id="diaryTitle" name="title" maxlength="60" placeholder="タイトル(なくてもOK)">
          <input type="password" id="diaryPass" name="pass" placeholder="合言葉" autocomplete="off">
        </div>
        <textarea id="diaryBody" maxlength="1000" placeholder="今日のこと、つぶやき……"></textarea>
        <div class="row" style="justify-content:space-between;align-items:center;">
          <span class="echat-note" id="diaryStatus" style="margin:0;"></span>
          <button class="echat-btn primary" id="diaryPostBtn">つぶやく</button>
        </div>
      </div>

      <div class="diary-entries" id="diaryEntries">
        <p class="echat-note">読み込み中…</p>
      </div>
    </div>

    <div class="back-wrap">
      <a class="back-link" href="index.html">← トップへ戻る</a>
    </div>

    <footer class="site-footer">
      <span class="mark">yonemaru's room</span>
    </footer>

  </div>

  <!-- ▼▼▼ Firebase（bbs.htmlと同じ設定値を貼ってください） ▼▼▼ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4J-diiATTbRl6RF0yATq4VwCofkET1g4",
      authDomain: "yonemaru-room.firebaseapp.com",
      projectId: "yonemaru-room",
      storageBucket: "yonemaru-room.firebasestorage.app",
      messagingSenderId: "719471435345",
      appId: "1:719471435345:web:e6c5a8bd93f236b8efa270"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 自分だけが投稿できるようにする合言葉。好きな文字列に変えてください。
    const DIARY_PASSWORD = "0727";
  </script>
  <!-- ▲▲▲ ここまで ▲▲▲ -->

  <script>
    const postBtn = document.getElementById('diaryPostBtn');
    const statusEl = document.getElementById('diaryStatus');

    postBtn.addEventListener('click', async () => {
      const pass = document.getElementById('diaryPass').value;
      const body = document.getElementById('diaryBody').value.trim();
      const title = document.getElementById('diaryTitle').value.trim();

      if (pass !== DIARY_PASSWORD) {
        statusEl.textContent = '合言葉がちがいます。';
        return;
      }
      if (!body) {
        statusEl.textContent = '本文を書いてください。';
        return;
      }

      postBtn.disabled = true;
      statusEl.textContent = '投稿しています…';

      try {
        await db.collection('diary_posts').add({
          title: title.slice(0, 60),
          body: body.slice(0, 1000),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('diaryBody').value = '';
        document.getElementById('diaryTitle').value = '';
        document.getElementById('diaryPass').value = '';
        statusEl.textContent = 'つぶやきました。';
      } catch (err) {
        console.error(err);
        statusEl.textContent = '投稿に失敗しました。Firebaseの設定をご確認ください。';
      } finally {
        postBtn.disabled = false;
      }
    });

    const entriesEl = document.getElementById('diaryEntries');
    db.collection('diary_posts')
      .orderBy('createdAt', 'desc')
      .limit(50)
      .onSnapshot((snapshot) => {
        if (snapshot.empty) {
          entriesEl.innerHTML = '<p class="echat-note">まだ何もつぶやいていません。</p>';
          return;
        }
        entriesEl.innerHTML = '';
        snapshot.forEach((doc) => {
          const d = doc.data();
          const wrap = document.createElement('div');
          wrap.className = 'diary-entry';

          const dateEl = document.createElement('div');
          dateEl.className = 'd-date';
          if (d.createdAt && d.createdAt.toDate) {
            const dt = d.createdAt.toDate();
            dateEl.textContent = dt.getFullYear() + '.' +
              String(dt.getMonth() + 1).padStart(2, '0') + '.' +
              String(dt.getDate()).padStart(2, '0') + ' ' +
              String(dt.getHours()).padStart(2, '0') + ':' +
              String(dt.getMinutes()).padStart(2, '0');
          } else {
            dateEl.textContent = 'たった今';
          }
          wrap.appendChild(dateEl);

          if (d.title) {
            const titleEl = document.createElement('div');
            titleEl.className = 'd-title';
            titleEl.textContent = d.title;
            wrap.appendChild(titleEl);
          }

          const bodyEl = document.createElement('div');
          bodyEl.className = 'd-body';
          bodyEl.textContent = d.body;
          wrap.appendChild(bodyEl);

          entriesEl.appendChild(wrap);
        });
      }, (err) => {
        console.error(err);
        entriesEl.innerHTML = '<p class="echat-note">読み込みに失敗しました。Firebaseの設定をご確認ください。</p>';
      });
  </script>
</body>
</html>
