<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>日記 | よねまるの部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame room-page">

    <header class="site-header">
      <span class="eng">diary</span>
      <h1>日記</h1>
      <div class="divider"></div>
    </header>

    <div class="room-body">
      <p class="diary-intro">ここで直接書けます。タイトルは空でもOK、合言葉を入れて投稿してください。</p>

      <div class="diary-post-form">
        <div class="icon-picker" id="iconPicker">
          <button type="button" class="icon-choice active" data-icon="icon-1-onigiri.png"><img src="images/icon-1-onigiri.png" alt=""></button>
          <button type="button" class="icon-choice" data-icon="icon-2.png"><img src="images/icon-2.png" alt=""></button>
          <button type="button" class="icon-choice" data-icon="icon-3.png"><img src="images/icon-3.png" alt=""></button>
          <button type="button" class="icon-choice" data-icon="icon-4.png"><img src="images/icon-4.png" alt=""></button>
          <label class="icon-choice icon-upload" id="iconUploadLabel">
            <img id="iconUploadPreview" src="" alt="" style="display:none;">
            <span id="iconUploadPlus">＋</span>
            <input type="file" id="iconUploadInput" accept="image/*" style="display:none;">
          </label>
        </div>
        <div class="row">
          <input type="text" id="diaryTitle" name="title" maxlength="60" placeholder="タイトル(なくてもOK)">
          <input type="text" id="diaryPass" name="pass" placeholder="合言葉" autocomplete="off">
        </div>
        <textarea id="diaryBody" maxlength="1000" placeholder="今日のこと、つぶやき……"></textarea>
        <div class="row" style="justify-content:space-between;align-items:center;">
          <span class="echat-note" id="diaryStatus" style="margin:0;"></span>
          <button class="echat-btn primary" id="diaryPostBtn">つぶやく</button>
        </div>
      </div>

      <div class="list-toolbar">
        <button class="sort-toggle" id="sortToggle">新しい順</button>
      </div>
      <div class="diary-entries" id="diaryEntries">
        <p class="echat-note">読み込み中…</p>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <div class="back-wrap">
      <a class="back-link" href="index.html">← トップへ戻る</a>
    </div>

    <footer class="site-footer">
      <span class="mark">yonemaru's room</span>
    </footer>

  </div>

  <!-- ▼▼▼ Firebase（bbs.htmlと同じ設定値を貼ってください） ▼▼▼ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4J-diiATTbRl6RF0yATq4VwCofkET1g4",
      authDomain: "yonemaru-room.firebaseapp.com",
      projectId: "yonemaru-room",
      storageBucket: "yonemaru-room.firebasestorage.app",
      messagingSenderId: "719471435345",
      appId: "1:719471435345:web:e6c5a8bd93f236b8efa270"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 自分だけが投稿できるようにする合言葉。好きな文字列に変えてください。
    const DIARY_PASSWORD = "0727";
  </script>
  <!-- ▲▲▲ ここまで ▲▲▲ -->

  <script src="reactions.js"></script>

  <script>
    const postBtn = document.getElementById('diaryPostBtn');
    const statusEl = document.getElementById('diaryStatus');

    let selectedIcon = 'icon-1-onigiri.png';
    document.querySelectorAll('.icon-choice[data-icon]').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.icon-choice').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedIcon = btn.dataset.icon;
      });
    });

    // 画像を選んで丸くトリミングし、アイコンとして使う
    document.getElementById('iconUploadInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const size = 160;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          ctx.save();
          ctx.beginPath();
          ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
          ctx.clip();
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
          ctx.restore();

          const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          selectedIcon = dataUrl;

          const preview = document.getElementById('iconUploadPreview');
          preview.src = dataUrl;
          preview.style.display = 'block';
          document.getElementById('iconUploadPlus').style.display = 'none';

          document.querySelectorAll('.icon-choice').forEach(b => b.classList.remove('active'));
          document.getElementById('iconUploadLabel').classList.add('active');
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    postBtn.addEventListener('click', async () => {
      const pass = document.getElementById('diaryPass').value;
      const body = document.getElementById('diaryBody').value.trim();
      const title = document.getElementById('diaryTitle').value.trim();

      if (pass !== DIARY_PASSWORD) {
        statusEl.textContent = '合言葉がちがいます。';
        return;
      }
      if (!body) {
        statusEl.textContent = '本文を書いてください。';
        return;
      }

      postBtn.disabled = true;
      statusEl.textContent = '投稿しています…';

      try {
        await db.collection('diary_posts').add({
          title: title.slice(0, 60),
          body: body.slice(0, 1000),
          icon: selectedIcon,
          reactions: {},
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('diaryBody').value = '';
        document.getElementById('diaryTitle').value = '';
        document.getElementById('diaryPass').value = '';
        statusEl.textContent = 'つぶやきました。';
      } catch (err) {
        console.error(err);
        statusEl.textContent = '投稿に失敗しました。Firebaseの設定をご確認ください。';
      } finally {
        postBtn.disabled = false;
      }
    });

    const entriesEl = document.getElementById('diaryEntries');
    const paginationEl = document.getElementById('pagination');
    const sortToggle = document.getElementById('sortToggle');

    const PAGE_SIZE = 15;
    let diaryAllDocs = []; // 新着順（desc）で保持
    let diarySortDesc = true;
    let diaryCurrentPage = 1;

    function formatDate(d) {
      if (d.createdAt && d.createdAt.toDate) {
        const dt = d.createdAt.toDate();
        return dt.getFullYear() + '.' +
          String(dt.getMonth() + 1).padStart(2, '0') + '.' +
          String(dt.getDate()).padStart(2, '0') + ' ' +
          String(dt.getHours()).padStart(2, '0') + ':' +
          String(dt.getMinutes()).padStart(2, '0');
      }
      return 'たった今';
    }

    function renderPaginationControls(container, totalItems, currentPage, onChange) {
      container.innerHTML = '';
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      if (totalPages <= 1) return;

      const makeBtn = (label, page, opts = {}) => {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (opts.active ? ' active' : '');
        btn.textContent = label;
        if (opts.disabled) btn.disabled = true;
        if (opts.dots) btn.classList.add('dots');
        if (!opts.disabled && !opts.dots) {
          btn.addEventListener('click', () => onChange(page));
        }
        return btn;
      };

      container.appendChild(makeBtn('‹', currentPage - 1, { disabled: currentPage === 1 }));

      const pages = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1]);
      let prev = 0;
      Array.from(pages).filter(p => p >= 1 && p <= totalPages).sort((a, b) => a - b).forEach(p => {
        if (prev && p - prev > 1) {
          container.appendChild(makeBtn('…', 0, { dots: true }));
        }
        container.appendChild(makeBtn(String(p), p, { active: p === currentPage }));
        prev = p;
      });

      container.appendChild(makeBtn('›', currentPage + 1, { disabled: currentPage === totalPages }));
    }


    function renderDiaryPage() {
      const items = diarySortDesc ? diaryAllDocs : [...diaryAllDocs].reverse();
      const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
      if (diaryCurrentPage > totalPages) diaryCurrentPage = totalPages;
      if (diaryCurrentPage < 1) diaryCurrentPage = 1;

      if (items.length === 0) {
        entriesEl.innerHTML = '<p class="echat-note">まだ何もつぶやいていません。</p>';
        paginationEl.innerHTML = '';
        return;
      }

      const start = (diaryCurrentPage - 1) * PAGE_SIZE;
      const pageItems = items.slice(start, start + PAGE_SIZE);

      entriesEl.innerHTML = '';
      pageItems.forEach((d) => {
        const wrap = document.createElement('div');
        wrap.className = 'sns-card';

        const iconEl = document.createElement('img');
        iconEl.className = 'sns-icon';
        const iconVal = d.icon || 'icon-blank.png';
        iconEl.src = iconVal.startsWith('data:') ? iconVal : 'images/' + iconVal;
        iconEl.alt = '';
        wrap.appendChild(iconEl);

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'sns-body-wrap';

        const dateEl = document.createElement('div');
        dateEl.className = 'd-date';
        dateEl.textContent = formatDate(d);
        bodyWrap.appendChild(dateEl);

        if (d.title) {
          const titleEl = document.createElement('div');
          titleEl.className = 'd-title';
          titleEl.textContent = d.title;
          bodyWrap.appendChild(titleEl);
        }

        if (d.quoteOf) {
          const quoteEl = document.createElement('div');
          quoteEl.className = 'sns-quote';
          quoteEl.textContent = '＞' + d.quoteOf;
          bodyWrap.appendChild(quoteEl);
        }

        const bodyEl = document.createElement('div');
        bodyEl.className = 'd-body';
        bodyEl.textContent = d.body;
        bodyWrap.appendChild(bodyEl);

        // リアクションバー(右寄せ・ピッカー式)
        const reactBar = buildReactionBar(d.reactions, (emoji) => {
          const key = 'reactions.' + emoji;
          db.collection('diary_posts').doc(d._id).update({
            [key]: firebase.firestore.FieldValue.increment(1)
          }).catch((err) => console.error(err));
        });
        reactBar.classList.add('react-bar-right');

        const replyToggle = document.createElement('button');
        replyToggle.className = 'reply-toggle';
        replyToggle.textContent = '返信する';
        reactBar.appendChild(replyToggle);

        bodyWrap.appendChild(reactBar);

        // 引用返信フォーム(トグル表示)
        const replyForm = document.createElement('div');
        replyForm.className = 'inline-reply-form';
        replyForm.style.display = 'none';
        replyForm.innerHTML = '<textarea maxlength="300" placeholder="返信を書く"></textarea><button class="echat-btn primary">送る</button>';
        bodyWrap.appendChild(replyForm);

        replyToggle.addEventListener('click', () => {
          replyForm.style.display = replyForm.style.display === 'none' ? 'block' : 'none';
        });

        replyForm.querySelector('button').addEventListener('click', async () => {
          const ta = replyForm.querySelector('textarea');
          const text = ta.value.trim();
          if (!text) return;
          const quote = d.body.length > 24 ? d.body.slice(0, 24) + '…' : d.body;
          try {
            await db.collection('diary_posts').add({
              title: '',
              body: text.slice(0, 300),
              quoteOf: quote,
              icon: 'icon-1-onigiri.png',
              reactions: {},
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            ta.value = '';
            replyForm.style.display = 'none';
          } catch (err) {
            console.error(err);
            alert('送信に失敗しました');
          }
        });

        wrap.appendChild(bodyWrap);
        entriesEl.appendChild(wrap);
      });

      renderPaginationControls(paginationEl, items.length, diaryCurrentPage, (page) => {
        diaryCurrentPage = page;
        renderDiaryPage();
        entriesEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }

    sortToggle.addEventListener('click', () => {
      diarySortDesc = !diarySortDesc;
      sortToggle.textContent = diarySortDesc ? '新しい順' : '古い順';
      diaryCurrentPage = 1;
      renderDiaryPage();
    });

    db.collection('diary_posts')
      .orderBy('createdAt', 'desc')
      .limit(300)
      .onSnapshot((snapshot) => {
        diaryAllDocs = snapshot.docs.map(doc => Object.assign({ _id: doc.id }, doc.data()));
        renderDiaryPage();
      }, (err) => {
        console.error(err);
        entriesEl.innerHTML = '<p class="echat-note">読み込みに失敗しました。Firebaseの設定をご確認ください。</p>';
      });
  </script>
</body>
</html>
