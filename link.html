<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>リンク | よねまるの部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame room-page">

    <header class="site-header">
      <span class="eng">links</span>
      <h1>リンク</h1>
      <div class="divider"></div>
    </header>

    <div class="room-body content">
      <section class="work-section" style="margin-top:0;padding-top:0;border-top:none;">
        <h2 style="margin-bottom:16px;">相互リンク</h2>

        <a href="https://chimata-lab.github.io/" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block;">
          <div class="link-card">
            <img class="banner" src="images/chimata-lab-banner.png" alt="CHIMATA LAB バナー">
            <div class="link-text">
              <h3>CHIMATA LAB／ちまた</h3>
              <p>お兄ちゃんを誰よりも夢見る、お兄ちゃん仲間。とにかく行動力があり、そのうち本当にお兄ちゃんを連れてくるのではという疑惑がある。10年来の友人で、手術に付き合ってもらったこともある。最終的には看取ってもらいたい。最近はデオちにお熱（フォルム雑多）</p>
            </div>
          </div>
        </a>
      </section>

      <section class="work-section">
        <h2 style="margin-bottom:16px;">うちのバナー</h2>
        <p class="series-desc">リンクしてくださる方はこちらのバナーをどうぞ、お持ち帰り自由です。</p>
        <img src="images/yonemaru-banner.png" alt="よねまるの部屋 バナー" style="border:1px solid var(--line);">
      </section>
    </div>

    <div class="back-wrap">
      <a class="back-link" href="index.html">← トップへ戻る</a>
    </div>

    <footer class="site-footer">
      <span class="mark">yonemaru's room</span>
    </footer>

  </div>
