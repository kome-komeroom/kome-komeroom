  <script src="anniversaries.js"></script>
  <script>
    const now = new Date();
    const m = String(now.getMonth() + 1);
    const d = String(now.getDate());
    const todays = (ANNIVERSARIES[m] && ANNIVERSARIES[m][d]) || [];
    const annivEl = document.getElementById('anniv-line');
    if (todays.length > 0) {
      annivEl.textContent = '今日は「' + todays.join('」・「') + '」';
    } else {
      annivEl.textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
    }
  </script>

  <!-- ▲▲▲ ここまで ▲▲▲ -->

  <script>
    db.collection('notices')
      .orderBy('createdAt', 'desc')
      .limit(1)
      .get()
      .then((snapshot) => {
        if (snapshot.empty) return;
        const d = snapshot.docs[0].data();
        const el = document.getElementById('notice-line');
        el.textContent = 'NEW：' + d.text;
        el.style.display = 'inline-block';
      })
      .catch((err) => console.error(err));
  </script>
