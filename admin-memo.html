<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>チラシ裏を書く | 管理者用 | よねまるの部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame room-page">

    <header class="site-header">
      <span class="eng">admin</span>
      <h1>チラシ裏を書く</h1>
      <div class="divider"></div>
    </header>

    <div class="room-body">

      <div id="authArea">
        <div class="auth-box">
          <p class="gate-label" style="margin-bottom:14px;">ログイン</p>
          <div class="row">
            <input type="email" id="authEmail" placeholder="メールアドレス" autocomplete="off">
            <input type="password" id="authPass" placeholder="パスワード" autocomplete="off">
          </div>
          <button class="echat-btn primary" id="authLoginBtn">ログイン</button>
          <span class="echat-note" id="authStatus"></span>
        </div>
      </div>

      <div id="gated-content" class="gated-content content" style="display:none;">
        <section class="work-section" style="margin-top:0;padding-top:0;border-top:none;">
          <div class="memo-post-form" style="border-bottom:none;padding-bottom:0;margin-bottom:0;">
            <div class="row">
              <input type="text" id="memoUrl" name="url" placeholder="YouTube・ニコニコ動画などのリンク">
              <input type="date" id="memoDate" name="date">
            </div>
            <div class="row">
              <select id="memoCategory">
                <option value="シラクサ氏">シラクサ氏</option>
                <option value="ペリカン">ペリカン</option>
                <option value="グラちゃん">グラちゃん</option>
                <option value="うんこちゃん関連">うんこちゃん関連</option>
                <option value="音MAD">音MAD</option>
                <option value="マンガ">マンガ</option>
                <option value="ゲーム">ゲーム</option>
                <option value="その他">その他</option>
              </select>
              <input type="file" id="memoImage" accept="image/*">
            </div>
            <textarea id="memoComment" maxlength="500" placeholder="感想メモ"></textarea>
            <div class="row" style="justify-content:space-between;align-items:center;">
              <span class="echat-note" id="memoStatus" style="margin:0;"></span>
              <button class="echat-btn primary" id="memoPostBtn">メモを残す</button>
            </div>
          </div>
        </section>
      </div>

    </div>

    <div class="back-wrap">
      <a class="back-link" href="admin.html">← 管理者用トップへ戻る</a>
    </div>

    <footer class="site-footer">
      <span class="mark">yonemaru's room</span>
    </footer>

  </div>

  <!-- ▼▼▼ Firebase(他ページと同じ設定値) ▼▼▼ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4J-diiATTbRl6RF0yATq4VwCofkET1g4",
      authDomain: "yonemaru-room.firebaseapp.com",
      projectId: "yonemaru-room",
      storageBucket: "yonemaru-room.firebasestorage.app",
      messagingSenderId: "719471435345",
      appId: "1:719471435345:web:e6c5a8bd93f236b8efa270"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
  <!-- ▲▲▲ ここまで ▲▲▲ -->

  <script>
    document.getElementById('authLoginBtn').addEventListener('click', () => {
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPass').value;
      const status = document.getElementById('authStatus');
      status.textContent = 'ログインしています…';
      auth.signInWithEmailAndPassword(email, pass)
        .catch((err) => {
          console.error(err);
          status.textContent = 'ログインできませんでした。メールアドレスとパスワードをご確認ください。';
        });
    });

    auth.onAuthStateChanged((user) => {
      const authArea = document.getElementById('authArea');
      const gatedContent = document.getElementById('gated-content');
      if (user) {
        authArea.style.display = 'none';
        gatedContent.style.display = 'block';
        const userEl = document.getElementById('inboxUser');
        if (userEl) userEl.textContent = 'ログイン中：' + user.email;
        if (typeof onLoggedIn === 'function') onLoggedIn();
      } else {
        authArea.style.display = 'block';
        gatedContent.style.display = 'none';
      }
    });
  </script>

  <script>
    function fileToCompressedDataUrl(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = ev.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('memoPostBtn').addEventListener('click', async () => {
      const status = document.getElementById('memoStatus');
      const url = document.getElementById('memoUrl').value.trim();
      const date = document.getElementById('memoDate').value;
      const category = document.getElementById('memoCategory').value;
      const comment = document.getElementById('memoComment').value.trim();
      const file = document.getElementById('memoImage').files[0];

      if (!url) {
        status.textContent = 'リンクを入れてください。';
        return;
      }

      status.textContent = '投稿しています…';
      try {
        let image = null;
        if (file) {
          image = await fileToCompressedDataUrl(file, 600, 0.7);
          if (image.length > 700000) {
            image = await fileToCompressedDataUrl(file, 400, 0.6);
          }
        }

        await db.collection('haishin_memos').add({
          url: url,
          date: date || '',
          category: category,
          comment: comment.slice(0, 500),
          image: image,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('memoUrl').value = '';
        document.getElementById('memoDate').value = '';
        document.getElementById('memoComment').value = '';
        document.getElementById('memoImage').value = '';
        status.textContent = 'メモを残しました。';
      } catch (err) {
        console.error(err);
        status.textContent = '失敗しました。Firebaseの設定をご確認ください。';
      }
    });
  </script>
</body>
</html>
