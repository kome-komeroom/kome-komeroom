<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>新着お知らせ | 管理者用 | よねまるの部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame room-page">

    <header class="site-header">
      <span class="eng">admin</span>
      <h1>新着お知らせ</h1>
      <div class="divider"></div>
    </header>

    <div class="room-body">

      <div id="authArea">
        <div class="auth-box">
          <p class="gate-label" style="margin-bottom:14px;">ログイン</p>
          <div class="row">
            <input type="email" id="authEmail" placeholder="メールアドレス" autocomplete="off">
            <input type="password" id="authPass" placeholder="パスワード" autocomplete="off">
          </div>
          <button class="echat-btn primary" id="authLoginBtn">ログイン</button>
          <span class="echat-note" id="authStatus"></span>
        </div>
      </div>

      <div id="gated-content" class="gated-content content" style="display:none;">
        <section class="work-section" style="margin-top:0;padding-top:0;border-top:none;">
          <p class="series-desc">トップページに小さく表示されます。</p>
          <div class="echat-toolbar" style="margin-top:0;">
            <input type="text" id="noticeText" maxlength="60" placeholder="例：「本の話」を追加しました" style="flex:1;min-width:180px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--line);padding:8px 10px;">
            <button class="echat-btn primary" id="noticeBtn">お知らせを出す</button>
          </div>
          <p class="echat-note" id="noticeStatus"></p>
        </section>
      </div>

    </div>

    <div class="back-wrap">
      <a class="back-link" href="admin.html">← 管理者用トップへ戻る</a>
    </div>

    <footer class="site-footer">
      <span class="mark">yonemaru's room</span>
    </footer>

  </div>

  <!-- ▼▼▼ Firebase(他ページと同じ設定値) ▼▼▼ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4J-diiATTbRl6RF0yATq4VwCofkET1g4",
      authDomain: "yonemaru-room.firebaseapp.com",
      projectId: "yonemaru-room",
      storageBucket: "yonemaru-room.firebasestorage.app",
      messagingSenderId: "719471435345",
      appId: "1:719471435345:web:e6c5a8bd93f236b8efa270"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
  <!-- ▲▲▲ ここまで ▲▲▲ -->

  <script>
    document.getElementById('authLoginBtn').addEventListener('click', () => {
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPass').value;
      const status = document.getElementById('authStatus');
      status.textContent = 'ログインしています…';
      auth.signInWithEmailAndPassword(email, pass)
        .catch((err) => {
          console.error(err);
          status.textContent = 'ログインできませんでした。メールアドレスとパスワードをご確認ください。';
        });
    });

    auth.onAuthStateChanged((user) => {
      const authArea = document.getElementById('authArea');
      const gatedContent = document.getElementById('gated-content');
      if (user) {
        authArea.style.display = 'none';
        gatedContent.style.display = 'block';
        const userEl = document.getElementById('inboxUser');
        if (userEl) userEl.textContent = 'ログイン中：' + user.email;
        if (typeof onLoggedIn === 'function') onLoggedIn();
      } else {
        authArea.style.display = 'block';
        gatedContent.style.display = 'none';
      }
    });
  </script>

  <script>
    document.getElementById('noticeBtn').addEventListener('click', async () => {
      const status = document.getElementById('noticeStatus');
      const text = document.getElementById('noticeText').value.trim();
      if (!text) {
        status.textContent = '内容を入れてください。';
        return;
      }
      status.textContent = '投稿しています…';
      try {
        await db.collection('notices').add({
          text: text.slice(0, 60),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('noticeText').value = '';
        status.textContent = 'お知らせを出しました。';

        // 直近30件だけ残して、それより古いものは削除
        const snapshot = await db.collection('notices').orderBy('createdAt', 'desc').get();
        const toDelete = snapshot.docs.slice(30);
        for (const doc of toDelete) {
          await doc.ref.delete();
        }
      } catch (err) {
        console.error(err);
        status.textContent = '失敗しました。Firebaseの設定をご確認ください。';
      }
    });
  </script>
</body>
</html>
